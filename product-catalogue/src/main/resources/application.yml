spring:
  application:
    name: product-catalogue

  datasource:
    url: jdbc:h2:mem:productcatalogdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

server:
  port: 8080

logging:
  level:
    org.springframework.jdbc: DEBUG
